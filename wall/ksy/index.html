<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Donor Wall — Keren Shlomo Yechiel</title>
    <meta name="robots" content="noindex, nofollow">
    <link rel="icon" type="image/png" href="../../NC_Logo_03.png">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Heebo:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        /* ============================================================
           RESET & BASE
           ============================================================ */
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            background-color: #121212;
            color: #EFEFEF;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            line-height: 1.6;
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* Subtle background texture */
        body::before {
            content: '';
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background:
                radial-gradient(ellipse at 20% 0%, rgba(77, 171, 247, 0.06) 0%, transparent 50%),
                radial-gradient(ellipse at 80% 100%, rgba(77, 171, 247, 0.04) 0%, transparent 50%);
            pointer-events: none;
            z-index: 0;
        }

        .page-wrapper {
            position: relative;
            z-index: 1;
            max-width: 1280px;
            margin: 0 auto;
            padding: 0 24px;
        }

        /* ============================================================
           HEADER
           ============================================================ */
        .header {
            text-align: center;
            padding: 40px 0 32px;
            border-bottom: 1px solid rgba(255,255,255,0.06);
        }

        .header-logo {
            height: 56px;
            width: auto;
            margin-bottom: 16px;
            opacity: 0.9;
            transition: opacity 0.3s;
        }

        .header-logo:hover { opacity: 1; }

        .campaign-title {
            font-size: 2.2rem;
            font-weight: 800;
            letter-spacing: -0.5px;
            color: #fff;
            margin-bottom: 4px;
            background: linear-gradient(135deg, #ffffff 0%, #4dabf7 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .campaign-subtitle {
            font-size: 0.95rem;
            color: rgba(255,255,255,0.45);
            font-weight: 400;
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        /* ============================================================
           LIVE INDICATOR
           ============================================================ */
        .live-indicator {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            margin-top: 16px;
            padding: 6px 16px;
            background: rgba(77, 171, 247, 0.08);
            border: 1px solid rgba(77, 171, 247, 0.15);
            border-radius: 100px;
            font-size: 0.78rem;
            color: rgba(255,255,255,0.5);
            letter-spacing: 0.5px;
            text-transform: uppercase;
        }

        .live-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #4dabf7;
            animation: pulse 2s ease-in-out infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; box-shadow: 0 0 0 0 rgba(77, 171, 247, 0.4); }
            50% { opacity: 0.6; box-shadow: 0 0 0 6px rgba(77, 171, 247, 0); }
        }

        /* ============================================================
           STAT CARDS
           ============================================================ */
        .stats-row {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 16px;
            margin: 32px 0 28px;
        }

        .stat-card {
            position: relative;
            padding: 28px 20px 24px;
            border-radius: 16px;
            text-align: center;
            overflow: hidden;
            border: 1px solid rgba(255,255,255,0.06);
            background: rgba(255,255,255,0.03);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            transition: transform 0.3s ease, border-color 0.3s ease;
        }

        .stat-card:hover {
            transform: translateY(-2px);
            border-color: rgba(77, 171, 247, 0.2);
        }

        .stat-card::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0;
            height: 3px;
        }

        .stat-card:nth-child(1)::before {
            background: linear-gradient(90deg, #4dabf7, #74c0fc);
        }
        .stat-card:nth-child(2)::before {
            background: linear-gradient(90deg, #69db7c, #38d9a9);
        }
        .stat-card:nth-child(3)::before {
            background: linear-gradient(90deg, #da77f2, #b197fc);
        }

        .stat-emoji {
            font-size: 1.6rem;
            margin-bottom: 8px;
            display: block;
        }

        .stat-value {
            font-size: 2.4rem;
            font-weight: 800;
            letter-spacing: -1px;
            color: #fff;
            line-height: 1.1;
            margin-bottom: 6px;
        }

        .stat-card:nth-child(1) .stat-value { color: #74c0fc; }
        .stat-card:nth-child(2) .stat-value { color: #69db7c; }
        .stat-card:nth-child(3) .stat-value { color: #da77f2; }

        .stat-label {
            font-size: 0.78rem;
            color: rgba(255,255,255,0.4);
            text-transform: uppercase;
            letter-spacing: 1.5px;
            font-weight: 600;
        }

        /* ============================================================
           PROGRESS BAR (optional, shown when goalAmount is set)
           ============================================================ */
        .progress-section {
            margin-bottom: 28px;
            display: none;
        }

        .progress-section.visible { display: block; }

        .progress-header {
            display: flex;
            justify-content: space-between;
            align-items: baseline;
            margin-bottom: 10px;
        }

        .progress-label {
            font-size: 0.85rem;
            color: rgba(255,255,255,0.5);
            font-weight: 500;
        }

        .progress-pct {
            font-size: 1.1rem;
            font-weight: 700;
            color: #4dabf7;
        }

        .progress-track {
            height: 10px;
            background: rgba(255,255,255,0.06);
            border-radius: 100px;
            overflow: hidden;
            position: relative;
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #4dabf7, #74c0fc);
            border-radius: 100px;
            transition: width 1s cubic-bezier(0.22, 1, 0.36, 1);
            position: relative;
            min-width: 0%;
        }

        .progress-fill::after {
            content: '';
            position: absolute;
            top: 0; right: 0; bottom: 0; left: 0;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.2), transparent);
            animation: shimmer 2s infinite;
        }

        @keyframes shimmer {
            0% { transform: translateX(-100%); }
            100% { transform: translateX(100%); }
        }

        /* ============================================================
           SORT CONTROLS
           ============================================================ */
        .controls-bar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 24px;
            flex-wrap: wrap;
            gap: 12px;
        }

        .donor-count-label {
            font-size: 0.9rem;
            color: rgba(255,255,255,0.45);
            font-weight: 500;
        }

        .sort-pills {
            display: flex;
            gap: 4px;
            background: rgba(255,255,255,0.04);
            border-radius: 100px;
            padding: 4px;
            border: 1px solid rgba(255,255,255,0.06);
        }

        .sort-pill {
            padding: 8px 20px;
            border: none;
            background: transparent;
            color: rgba(255,255,255,0.45);
            font-family: 'Inter', sans-serif;
            font-size: 0.82rem;
            font-weight: 600;
            cursor: pointer;
            border-radius: 100px;
            transition: all 0.25s ease;
            letter-spacing: 0.3px;
        }

        .sort-pill:hover {
            color: rgba(255,255,255,0.7);
        }

        .sort-pill.active {
            background: #4dabf7;
            color: #121212;
            box-shadow: 0 2px 12px rgba(77, 171, 247, 0.3);
        }

        /* ============================================================
           DONOR CARDS GRID
           ============================================================ */
        .donors-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 16px;
            margin-bottom: 48px;
        }

        .donor-card {
            position: relative;
            padding: 24px 20px 20px;
            border-radius: 14px;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.06);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            transition: transform 0.3s ease, box-shadow 0.3s ease, border-color 0.3s ease;
            opacity: 0;
            transform: translateY(16px);
            animation: cardFadeIn 0.5s ease forwards;
        }

        .donor-card:hover {
            transform: translateY(-4px);
            box-shadow: 0 12px 40px rgba(0, 0, 0, 0.3), 0 0 0 1px rgba(77, 171, 247, 0.15);
            border-color: rgba(77, 171, 247, 0.2);
        }

        @keyframes cardFadeIn {
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .donor-name {
            font-size: 1.1rem;
            font-weight: 700;
            color: #fff;
            margin-bottom: 8px;
            line-height: 1.3;
            word-wrap: break-word;
        }

        .donor-name.anonymous {
            font-family: 'Heebo', sans-serif;
            direction: rtl;
            color: rgba(255,255,255,0.6);
            font-style: italic;
        }

        .donor-amount {
            font-size: 1.5rem;
            font-weight: 800;
            color: #4dabf7;
            letter-spacing: -0.5px;
            margin-bottom: 8px;
        }

        .donor-memo {
            font-size: 0.82rem;
            color: rgba(255,255,255,0.45);
            font-style: italic;
            line-height: 1.5;
            margin-bottom: 10px;
            word-wrap: break-word;
        }

        .donor-date {
            font-size: 0.72rem;
            color: rgba(255,255,255,0.25);
            font-weight: 500;
            letter-spacing: 0.5px;
            text-transform: uppercase;
        }

        .donor-teams {
            display: flex;
            flex-wrap: wrap;
            gap: 4px;
            margin-top: 8px;
        }

        .team-badge {
            display: inline-flex;
            align-items: center;
            padding: 2px 8px;
            border-radius: 100px;
            font-size: 0.68rem;
            font-weight: 600;
            letter-spacing: 0.3px;
            background: rgba(77, 171, 247, 0.12);
            color: #74c0fc;
            border: 1px solid rgba(77, 171, 247, 0.2);
        }

        /* Rank badge for top 3 donors */
        .donor-card[data-rank="1"]::after,
        .donor-card[data-rank="2"]::after,
        .donor-card[data-rank="3"]::after {
            position: absolute;
            top: 12px;
            right: 14px;
            font-size: 1.2rem;
            line-height: 1;
        }
        .donor-card[data-rank="1"]::after { content: '🥇'; }
        .donor-card[data-rank="2"]::after { content: '🥈'; }
        .donor-card[data-rank="3"]::after { content: '🥉'; }

        /* ============================================================
           LOADING STATE
           ============================================================ */
        .loading-screen {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 80px 20px;
            gap: 20px;
        }

        .spinner {
            width: 44px;
            height: 44px;
            border: 3px solid rgba(255,255,255,0.08);
            border-top-color: #4dabf7;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .loading-text {
            font-size: 0.9rem;
            color: rgba(255,255,255,0.35);
            font-weight: 500;
        }

        /* ============================================================
           ACCESS DENIED
           ============================================================ */
        .access-denied {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 100px 20px;
            text-align: center;
        }

        .access-denied-icon {
            font-size: 3.5rem;
            margin-bottom: 20px;
            opacity: 0.7;
        }

        .access-denied h2 {
            font-size: 1.5rem;
            color: #fff;
            margin-bottom: 8px;
            font-weight: 700;
        }

        .access-denied p {
            font-size: 0.95rem;
            color: rgba(255,255,255,0.4);
            max-width: 400px;
        }

        /* ============================================================
           EMPTY STATE
           ============================================================ */
        .empty-state {
            text-align: center;
            padding: 80px 20px;
            color: rgba(255,255,255,0.3);
        }

        .empty-state-icon {
            font-size: 3rem;
            margin-bottom: 16px;
        }

        .empty-state h3 {
            font-size: 1.2rem;
            color: rgba(255,255,255,0.5);
            margin-bottom: 8px;
        }

        /* ============================================================
           FOOTER
           ============================================================ */
        .footer {
            text-align: center;
            padding: 32px 20px 40px;
            border-top: 1px solid rgba(255,255,255,0.06);
        }

        .footer-text {
            font-size: 0.78rem;
            color: rgba(255,255,255,0.25);
            line-height: 1.8;
        }

        .footer-text .refresh-time {
            color: rgba(255,255,255,0.35);
        }

        /* ============================================================
           RESPONSIVE
           ============================================================ */
        @media (max-width: 1024px) {
            .donors-grid {
                grid-template-columns: repeat(3, 1fr);
            }
        }

        @media (max-width: 768px) {
            .donors-grid {
                grid-template-columns: repeat(2, 1fr);
            }

            .stats-row {
                gap: 10px;
            }

            .stat-value {
                font-size: 1.8rem;
            }

            .stat-label {
                font-size: 0.7rem;
            }

            .campaign-title {
                font-size: 1.6rem;
            }

            .controls-bar {
                justify-content: center;
            }
        }

        @media (max-width: 540px) {
            .donors-grid {
                grid-template-columns: 1fr;
            }

            .stats-row {
                grid-template-columns: 1fr;
                gap: 10px;
            }

            .stat-card {
                padding: 20px 16px;
                display: flex;
                align-items: center;
                gap: 16px;
                text-align: left;
            }

            .stat-emoji {
                font-size: 1.4rem;
                margin-bottom: 0;
            }

            .stat-card-text {
                flex: 1;
            }

            .stat-value {
                font-size: 1.6rem;
                margin-bottom: 2px;
            }

            .page-wrapper {
                padding: 0 16px;
            }

            .header {
                padding: 28px 0 24px;
            }
        }

        /* ============================================================
           TRANSITION FOR SMOOTH DATA UPDATES
           ============================================================ */
        .fade-update {
            animation: fadeUpdate 0.4s ease;
        }

        @keyframes fadeUpdate {
            0% { opacity: 0.6; }
            100% { opacity: 1; }
        }

        /* Scrollbar styling */
        ::-webkit-scrollbar {
            width: 8px;
        }
        ::-webkit-scrollbar-track {
            background: #121212;
        }
        ::-webkit-scrollbar-thumb {
            background: rgba(255,255,255,0.1);
            border-radius: 100px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: rgba(255,255,255,0.2);
        }

        /* ============================================================
           TEAM FILTER PILLS
           ============================================================ */
        .filter-bar {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }

        .filter-label {
            font-size: 0.78rem;
            color: rgba(255,255,255,0.4);
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-right: 4px;
        }

        .filter-pill {
            padding: 6px 16px;
            border: 1px solid rgba(255,255,255,0.1);
            background: rgba(255,255,255,0.04);
            color: rgba(255,255,255,0.5);
            font-family: 'Inter', sans-serif;
            font-size: 0.78rem;
            font-weight: 500;
            cursor: pointer;
            border-radius: 100px;
            transition: all 0.2s ease;
        }

        .filter-pill:hover {
            border-color: rgba(77, 171, 247, 0.3);
            color: rgba(255,255,255,0.8);
        }

        .filter-pill.active {
            background: rgba(77, 171, 247, 0.15);
            border-color: rgba(77, 171, 247, 0.4);
            color: #74c0fc;
        }

        /* ============================================================
           VIEW TOGGLE (Donors / Teams)
           ============================================================ */
        .view-toggle {
            display: flex;
            gap: 4px;
            background: rgba(255,255,255,0.04);
            border-radius: 100px;
            padding: 4px;
            border: 1px solid rgba(255,255,255,0.06);
        }

        .view-toggle-btn {
            padding: 8px 20px;
            border: none;
            background: transparent;
            color: rgba(255,255,255,0.45);
            font-family: 'Inter', sans-serif;
            font-size: 0.82rem;
            font-weight: 600;
            cursor: pointer;
            border-radius: 100px;
            transition: all 0.25s ease;
        }

        .view-toggle-btn:hover {
            color: rgba(255,255,255,0.7);
        }

        .view-toggle-btn.active {
            background: #4dabf7;
            color: #121212;
            box-shadow: 0 2px 12px rgba(77, 171, 247, 0.3);
        }

        /* ============================================================
           TEAM CARDS (teams view)
           ============================================================ */
        .team-card {
            position: relative;
            padding: 24px 20px;
            border-radius: 14px;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.06);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            transition: transform 0.3s ease, box-shadow 0.3s ease, border-color 0.3s ease;
            opacity: 0;
            transform: translateY(16px);
            animation: cardFadeIn 0.5s ease forwards;
        }

        .team-card:hover {
            transform: translateY(-4px);
            box-shadow: 0 12px 40px rgba(0, 0, 0, 0.3), 0 0 0 1px rgba(77, 171, 247, 0.15);
            border-color: rgba(77, 171, 247, 0.2);
        }

        .team-card-name {
            font-size: 1.2rem;
            font-weight: 700;
            color: #fff;
            margin-bottom: 12px;
        }

        .team-card-stats {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            margin-bottom: 12px;
        }

        .team-stat {
            text-align: center;
            padding: 12px 8px;
            background: rgba(255,255,255,0.03);
            border-radius: 10px;
            border: 1px solid rgba(255,255,255,0.05);
        }

        .team-stat-value {
            font-size: 1.4rem;
            font-weight: 800;
            color: #4dabf7;
            letter-spacing: -0.5px;
        }

        .team-stat-label {
            font-size: 0.7rem;
            color: rgba(255,255,255,0.35);
            text-transform: uppercase;
            letter-spacing: 1px;
            font-weight: 600;
            margin-top: 4px;
        }

        .team-card-bar {
            height: 3px;
            position: absolute;
            top: 0; left: 0; right: 0;
            border-radius: 14px 14px 0 0;
            background: linear-gradient(90deg, #4dabf7, #74c0fc);
        }

        /* Goal progress card */
        .goal-card .stat-card-text { min-width: 0; }
        .goal-progress-bar {
            width: 100%;
            height: 8px;
            background: rgba(255,255,255,0.08);
            border-radius: 4px;
            overflow: hidden;
        }
        .goal-progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #4dabf7, #74c0fc);
            border-radius: 4px;
            width: 0%;
            transition: width 1.2s cubic-bezier(0.4, 0, 0.2, 1);
        }
    </style>
</head>
<body>

<div class="page-wrapper">

    <!-- ============================================================
         HEADER
         ============================================================ -->
    <header class="header">
        <img src="../../NC_Logo_03.png" alt="Notzer Chesed" class="header-logo">
        <h1 class="campaign-title">Keren Shlomo Yechiel — Donor Wall</h1>
        <p class="campaign-subtitle">Internal Dashboard</p>
        <div class="live-indicator">
            <span class="live-dot"></span>
            <span>Live Data</span>
        </div>
    </header>

    <!-- ============================================================
         STATS ROW
         ============================================================ -->
    <div class="stats-row" id="stats-row">
        <div class="stat-card">
            <span class="stat-emoji">💰</span>
            <div class="stat-card-text">
                <div class="stat-value" id="stat-total">—</div>
                <div class="stat-label">Total Raised</div>
            </div>
        </div>
        <div class="stat-card">
            <span class="stat-emoji">👥</span>
            <div class="stat-card-text">
                <div class="stat-value" id="stat-donors">—</div>
                <div class="stat-label">Total Donors</div>
            </div>
        </div>
        <div class="stat-card goal-card">
            <span class="stat-emoji">🎯</span>
            <div class="stat-card-text" style="flex:1; width:100%;">
                <div style="display:flex; justify-content:space-between; align-items:baseline; margin-bottom:4px;">
                    <div class="stat-value" id="stat-goal-raised" style="font-size:1.1rem;">—</div>
                    <div id="stat-goal-target" style="font-size:0.8rem; color:#888;">of —</div>
                </div>
                <div class="goal-progress-bar">
                    <div class="goal-progress-fill" id="goal-fill"></div>
                </div>
                <div id="goal-pct" style="font-size:0.75rem; color:#4dabf7; margin-top:3px; text-align:right;">0%</div>
            </div>
        </div>
    </div>


    <!-- ============================================================
         TEAM FILTER BAR (hidden until teams loaded)
         ============================================================ -->
    <div class="filter-bar" id="filter-bar" style="display: none;">
        <span class="filter-label">Teams:</span>
        <button class="filter-pill active" data-team="" onclick="setTeamFilter('')">All</button>
        <!-- Team pills injected by JS -->
    </div>

    <!-- ============================================================
         SORT & VIEW CONTROLS
         ============================================================ -->
    <div class="controls-bar" id="controls-bar" style="display: none;">
        <div class="donor-count-label" id="donor-count-label"></div>
        <div style="display:flex; gap:8px; align-items:center; flex-wrap:wrap;">
            <div class="view-toggle">
                <button class="view-toggle-btn active" data-view="donors" onclick="setView('donors')">👥 Donors</button>
                <button class="view-toggle-btn" data-view="teams" onclick="setView('teams')">🏆 Teams</button>
            </div>
            <div class="sort-pills" id="sort-pills">
                <button class="sort-pill active" data-sort="amount" onclick="setSort('amount')">Sort by Amount</button>
                <button class="sort-pill" data-sort="date" onclick="setSort('date')">Sort by Date</button>
            </div>
        </div>
    </div>

    <!-- ============================================================
         MAIN CONTENT AREA
         ============================================================ -->
    <div id="main-content">
        <!-- Loading state -->
        <div class="loading-screen" id="loading-screen">
            <div class="spinner"></div>
            <div class="loading-text">Loading donor data…</div>
        </div>
    </div>

    <!-- ============================================================
         DONOR GRID (hidden until loaded)
         ============================================================ -->
    <div class="donors-grid" id="donors-grid" style="display: none;"></div>

    <!-- ============================================================
         FOOTER
         ============================================================ -->
    <footer class="footer">
        <div class="footer-text">
            This page is not publicly listed. Data refreshes automatically.<br>
            Last updated: <span class="refresh-time" id="last-refresh">—</span>
        </div>
    </footer>

</div>

<script>
// ============================================================
// CONFIGURATION
// ============================================================
const CONFIG = {
    campaignName: 'Keren Shlomo Yechiel',
    campaignCode: 'ksy',
    appsScriptUrl: 'https://script.google.com/macros/s/AKfycbzpxIaoeZewC6uMC8wrbXqytzq3FfTQXg2Yx10PGy6BJEMOM9hTg1HDUg3-C-4TkUhnnQ/exec',
    key: new URLSearchParams(window.location.search).get('key'),
    refreshInterval: 30000,
};

// ============================================================
// STATE
// ============================================================
let currentDonors = [];
let currentTotals = {};
let currentTeamTotals = {};
let allTeams = [];  // from Teams sheet
let currentSort = 'amount';
let currentView = 'donors'; // 'donors' or 'teams'
let currentTeamFilter = new URLSearchParams(window.location.search).get('team') || '';
let campaignGoal = 0;
let isFirstLoad = true;

// ============================================================
// FORMAT HELPERS
// ============================================================
function formatCurrency(amount) {
    if (amount == null || isNaN(amount)) return '$0';
    return '$' + Number(amount).toLocaleString('en-US', {
        minimumFractionDigits: 0,
        maximumFractionDigits: 0
    });
}

function formatDate(timestamp) {
    if (!timestamp) return '';
    const d = new Date(timestamp);
    if (isNaN(d.getTime())) return timestamp;
    return d.toLocaleDateString('en-US', {
        month: 'short',
        day: 'numeric',
        year: 'numeric'
    });
}

function formatRefreshTime() {
    return new Date().toLocaleTimeString('en-US', {
        hour: 'numeric',
        minute: '2-digit',
        second: '2-digit'
    });
}

function getTeamName(teamId) {
    const team = allTeams.find(t => t.id.toLowerCase() === teamId.toLowerCase());
    return team ? team.name : teamId;
}

// ============================================================
// DATA FETCHING
// ============================================================
async function fetchDonors() {
    let url = `${CONFIG.appsScriptUrl}?action=getDonors&campaign=${CONFIG.campaignCode}&key=${CONFIG.key}`;
    // Note: team filtering is done client-side to keep teamTotals accurate across all donors
    const response = await fetch(url);
    const data = await response.json();
    return data;
}

async function fetchTeams() {
    try {
        const url = `${CONFIG.appsScriptUrl}?action=getTeams&key=${CONFIG.key}`;
        const response = await fetch(url);
        const data = await response.json();
        if (data.status === 'success' && data.teams && data.teams.length > 0) {
            allTeams = data.teams;
            renderTeamFilterPills();
        }
    } catch (err) {
        console.log('Could not load teams:', err);
    }
}

async function loadData() {
    try {
        const data = await fetchDonors();

        // Check for errors (invalid key, etc.)
        if (data.status === 'error') {
            showAccessDenied(data.message || 'Access denied.');
            return;
        }

        currentTotals = data.totals || {};
        currentDonors = data.donors || [];
        currentTeamTotals = data.teamTotals || {};
        campaignGoal = data.campaignGoal || 0;

        updateStats();
        renderCurrentView();

        // Update refresh timestamp
        document.getElementById('last-refresh').textContent = formatRefreshTime();

        if (isFirstLoad) {
            isFirstLoad = false;
            document.getElementById('loading-screen').style.display = 'none';
            document.getElementById('controls-bar').style.display = 'flex';
            document.getElementById('donors-grid').style.display = 'grid';

            // Apply URL team filter if present
            if (currentTeamFilter) {
                setTeamFilter(currentTeamFilter);
            }
        }

    } catch (err) {
        console.error('Failed to fetch donor data:', err);
        if (isFirstLoad) {
            showAccessDenied('Unable to load data. Please check the URL and try again.');
        }
    }
}

// ============================================================
// TEAM FILTER
// ============================================================
function renderTeamFilterPills() {
    const bar = document.getElementById('filter-bar');
    if (!allTeams.length) return;

    // Remove old team pills (keep the "All" button)
    const existing = bar.querySelectorAll('.filter-pill[data-team]:not([data-team=""])');
    existing.forEach(el => el.remove());

    allTeams.forEach(team => {
        const pill = document.createElement('button');
        pill.className = 'filter-pill' + (currentTeamFilter === team.id ? ' active' : '');
        pill.dataset.team = team.id;
        pill.textContent = team.name;
        pill.onclick = () => setTeamFilter(team.id);
        bar.appendChild(pill);
    });

    // Update "All" pill state
    const allPill = bar.querySelector('[data-team=""]');
    if (allPill) allPill.classList.toggle('active', !currentTeamFilter);

    bar.style.display = 'flex';
}

function setTeamFilter(teamId) {
    currentTeamFilter = teamId;

    // Update pill states
    document.querySelectorAll('.filter-pill').forEach(pill => {
        pill.classList.toggle('active', pill.dataset.team === teamId);
    });

    updateStats();
    renderCurrentView();

    // Update donor count label
    updateDonorCountLabel();
}

function getFilteredDonors() {
    if (!currentTeamFilter) return currentDonors;
    return currentDonors.filter(d => {
        if (!d.teams) return false;
        const teamList = d.teams.split(',').map(t => t.trim().toLowerCase());
        return teamList.includes(currentTeamFilter.toLowerCase());
    });
}

// ============================================================
// VIEW TOGGLE
// ============================================================
function setView(view) {
    currentView = view;

    document.querySelectorAll('.view-toggle-btn').forEach(btn => {
        btn.classList.toggle('active', btn.dataset.view === view);
    });

    // Show/hide sort pills (only relevant in donors view)
    document.getElementById('sort-pills').style.display = view === 'donors' ? 'flex' : 'none';

    renderCurrentView();
}

function renderCurrentView() {
    if (currentView === 'teams') {
        renderTeamCards();
    } else {
        sortAndRender();
    }
    updateDonorCountLabel();
}

// ============================================================
// UPDATE UI
// ============================================================
function updateStats() {
    const totalEl = document.getElementById('stat-total');
    const donorsEl = document.getElementById('stat-donors');

    const newTotal = formatCurrency(currentTotals.totalRaised);
    const newDonors = (currentTotals.donorCount || 0).toLocaleString();

    if (totalEl.textContent !== newTotal) {
        totalEl.textContent = newTotal;
        if (!isFirstLoad) totalEl.classList.add('fade-update');
    }
    if (donorsEl.textContent !== newDonors) {
        donorsEl.textContent = newDonors;
        if (!isFirstLoad) donorsEl.classList.add('fade-update');
    }

    // Remove animation class after it completes
    setTimeout(() => {
        totalEl.classList.remove('fade-update');
        donorsEl.classList.remove('fade-update');
    }, 500);

    // Update goal progress card
    const goalRaised = currentTotals.totalRaised || 0;
    let activeGoal = campaignGoal;

    // If filtered by team, use team-specific goal
    if (currentTeamFilter) {
        const teamObj = allTeams.find(t => t.id.toLowerCase() === currentTeamFilter.toLowerCase());
        if (teamObj && teamObj.goal) {
            activeGoal = teamObj.goal;
        }
    }

    const goalRaisedEl = document.getElementById('stat-goal-raised');
    const goalTargetEl = document.getElementById('stat-goal-target');
    const goalFillEl = document.getElementById('goal-fill');
    const goalPctEl = document.getElementById('goal-pct');

    if (activeGoal > 0) {
        goalRaisedEl.textContent = formatCurrency(goalRaised);
        goalTargetEl.textContent = 'of ' + formatCurrency(activeGoal);
        const pct = Math.min(100, (goalRaised / activeGoal) * 100);
        goalFillEl.style.width = pct + '%';
        goalPctEl.textContent = Math.round(pct) + '%';
    } else {
        goalRaisedEl.textContent = formatCurrency(goalRaised);
        goalTargetEl.textContent = '';
        goalFillEl.style.width = '0%';
        goalPctEl.textContent = 'No goal set';
    }
}

function updateDonorCountLabel() {
    const countLabel = document.getElementById('donor-count-label');
    if (currentView === 'teams') {
        const teamCount = Object.keys(currentTeamTotals).length;
        countLabel.textContent = `${teamCount} team${teamCount !== 1 ? 's' : ''}`;
    } else {
        const filtered = getFilteredDonors();
        const suffix = currentTeamFilter ? ` in ${getTeamName(currentTeamFilter)}` : '';
        countLabel.textContent = `${filtered.length} confirmed donor${filtered.length !== 1 ? 's' : ''}${suffix}`;
    }
}

// ============================================================
// SORTING
// ============================================================
function setSort(sortBy) {
    currentSort = sortBy;

    // Update pill buttons
    document.querySelectorAll('.sort-pill').forEach(pill => {
        pill.classList.toggle('active', pill.dataset.sort === sortBy);
    });

    sortAndRender();
}

function sortAndRender() {
    const filtered = getFilteredDonors();
    const sorted = [...filtered];

    if (currentSort === 'amount') {
        sorted.sort((a, b) => (b.amount || 0) - (a.amount || 0));
    } else {
        sorted.sort((a, b) => {
            const dateA = new Date(a.timestamp || 0);
            const dateB = new Date(b.timestamp || 0);
            return dateB - dateA;
        });
    }

    renderDonors(sorted);
}

// ============================================================
// RENDER DONOR CARDS
// ============================================================
function renderDonors(donors) {
    const grid = document.getElementById('donors-grid');

    if (!donors || donors.length === 0) {
        grid.innerHTML = `
            <div class="empty-state" style="grid-column: 1 / -1;">
                <div class="empty-state-icon">🕊️</div>
                <h3>No donations yet</h3>
                <p>Donations will appear here as they are confirmed.</p>
            </div>
        `;
        return;
    }

    // Assign ranks based on amount (for badges)
    const ranked = [...donors].sort((a, b) => (b.amount || 0) - (a.amount || 0));
    const rankMap = new Map();
    ranked.forEach((d, i) => {
        if (i < 3) rankMap.set(d, i + 1);
    });

    const fragment = document.createDocumentFragment();

    donors.forEach((donor, index) => {
        const card = document.createElement('div');
        card.className = 'donor-card';
        card.style.animationDelay = `${Math.min(index * 60, 800)}ms`;

        const rank = rankMap.get(donor);
        if (rank && currentSort === 'amount') {
            card.setAttribute('data-rank', rank);
        }

        const isAnonymous = donor.anonymous;
        const displayName = isAnonymous ? 'בעילום שם' : (donor.displayName || 'Anonymous');

        let html = '';
        html += `<div class="donor-name${isAnonymous ? ' anonymous' : ''}">${escapeHTML(displayName)}</div>`;
        html += `<div class="donor-amount">${formatCurrency(donor.amount)}</div>`;

        if (donor.memo && donor.memo.trim()) {
            html += `<div class="donor-memo">"${escapeHTML(donor.memo)}"</div>`;
        }

        html += `<div class="donor-date">${formatDate(donor.timestamp)}</div>`;

        // Team badges
        if (donor.teams && donor.teams.trim()) {
            const teamIds = donor.teams.split(',').map(t => t.trim()).filter(Boolean);
            if (teamIds.length > 0) {
                html += '<div class="donor-teams">';
                teamIds.forEach(tid => {
                    html += `<span class="team-badge">${escapeHTML(getTeamName(tid))}</span>`;
                });
                html += '</div>';
            }
        }

        card.innerHTML = html;
        fragment.appendChild(card);
    });

    grid.innerHTML = '';
    grid.appendChild(fragment);
}

// ============================================================
// RENDER TEAM CARDS (teams view)
// ============================================================
function renderTeamCards() {
    const grid = document.getElementById('donors-grid');

    if (!currentTeamTotals || Object.keys(currentTeamTotals).length === 0) {
        grid.innerHTML = `
            <div class="empty-state" style="grid-column: 1 / -1;">
                <div class="empty-state-icon">🏆</div>
                <h3>No teams yet</h3>
                <p>Teams will appear here when donors are assigned to them.</p>
            </div>
        `;
        return;
    }

    // Sort teams by amount (highest first)
    const teamEntries = Object.entries(currentTeamTotals)
        .sort((a, b) => b[1].amount - a[1].amount);

    const fragment = document.createDocumentFragment();

    teamEntries.forEach(([teamId, data], index) => {
        const card = document.createElement('div');
        card.className = 'team-card';
        card.style.animationDelay = `${Math.min(index * 80, 600)}ms`;
        card.style.cursor = 'pointer';
        card.onclick = () => {
            setView('donors');
            setTeamFilter(teamId);
        };

        const teamName = getTeamName(teamId);
        const avgPerDonor = data.count > 0 ? Math.round(data.amount / data.count) : 0;

        card.innerHTML = `
            <div class="team-card-bar"></div>
            <div class="team-card-name">${escapeHTML(teamName)}</div>
            <div class="team-card-stats">
                <div class="team-stat">
                    <div class="team-stat-value">${formatCurrency(data.amount)}</div>
                    <div class="team-stat-label">Total Raised</div>
                </div>
                <div class="team-stat">
                    <div class="team-stat-value">${data.count}</div>
                    <div class="team-stat-label">Donors</div>
                </div>
            </div>
            <div style="text-align:center; font-size:0.75rem; color:rgba(255,255,255,0.3);">
                Avg: ${formatCurrency(avgPerDonor)} per donor
            </div>
        `;

        fragment.appendChild(card);
    });

    grid.innerHTML = '';
    grid.appendChild(fragment);
}

function escapeHTML(str) {
    if (!str) return '';
    const div = document.createElement('div');
    div.textContent = str;
    return div.innerHTML;
}

// ============================================================
// ACCESS DENIED / ERROR STATE
// ============================================================
function showAccessDenied(message) {
    const main = document.getElementById('main-content');
    main.innerHTML = `
        <div class="access-denied">
            <div class="access-denied-icon">🔒</div>
            <h2>Access Denied</h2>
            <p>${escapeHTML(message || 'This page requires a valid access key. Please check the URL you were given.')}</p>
        </div>
    `;
    document.getElementById('stats-row').style.display = 'none';
    document.getElementById('controls-bar').style.display = 'none';
    document.getElementById('donors-grid').style.display = 'none';
    document.getElementById('filter-bar').style.display = 'none';
}

// ============================================================
// INITIALIZATION
// ============================================================
(function init() {
    // Check for key
    if (!CONFIG.key) {
        document.getElementById('loading-screen').style.display = 'none';
        showAccessDenied('No access key provided. Please use the link you were given.');
        return;
    }

    // Fetch teams list (for filter pills + team name lookups)
    fetchTeams();

    // Initial load
    loadData();

    // Auto-refresh
    setInterval(loadData, CONFIG.refreshInterval);
})();
</script>

</body>
</html>
